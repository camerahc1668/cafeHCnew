name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-android:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: npm install
      - name: Add Android platform
        run: npx cap add android
      - name: Copy web assets
        run: npx cap copy android
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Apply network security config
        run: |
          mkdir -p android/app/src/main/res/xml
          cp android-resources/network_security_config.xml android/app/src/main/res/xml/
          sed -i 's/android:theme="@style\/AppTheme"/android:theme="@style\/AppTheme"\n        android:networkSecurityConfig="@xml\/network_security_config"/' \
            android/app/src/main/AndroidManifest.xml

      - name: Fix Vietnamese IME (tiếng Việt)
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          # Thêm windowSoftInputMode=adjustResize vào MainActivity
          sed -i 's/android:name="com.poshc.app.MainActivity"/android:name="com.poshc.app.MainActivity"\n        android:windowSoftInputMode="adjustResize"/' "$MANIFEST"
          
          echo "✅ Đã patch AndroidManifest.xml"
          grep -A5 "MainActivity" "$MANIFEST"

      - name: Apply Icons & Splash Screens
        run: |
          RES=android/app/src/main/res
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p $RES/mipmap-$density
            cp assets/android/mipmap-$density/ic_launcher.png        $RES/mipmap-$density/
            cp assets/android/mipmap-$density/ic_launcher_round.png  $RES/mipmap-$density/
            cp assets/android/mipmap-$density/ic_launcher_foreground.png $RES/mipmap-$density/
          done
          mkdir -p $RES/mipmap-anydpi-v26
          cp assets/android/mipmap-anydpi-v26/ic_launcher.xml       $RES/mipmap-anydpi-v26/
          cp assets/android/mipmap-anydpi-v26/ic_launcher_round.xml $RES/mipmap-anydpi-v26/
          mkdir -p $RES/values
          cp assets/android/values/ic_launcher_background.xml $RES/values/
          mkdir -p $RES/drawable
          cp assets/android/drawable/splash.png      $RES/drawable/
          cp assets/android/drawable/splash_land.png $RES/drawable/
          echo "✅ Icons & splash applied"
      - name: Make gradlew executable
        run: chmod +x android/gradlew
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: POS-HC-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
