name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install dependencies
        run: npm install

      - name: Add iOS platform
        run: npx cap add ios

      - name: Copy web assets
        run: npx cap copy ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Apply Icons & Splash Screens
        run: |
          XCASSETS=ios/App/App/Assets.xcassets

          # AppIcon
          mkdir -p $XCASSETS/AppIcon.appiconset
          cp assets/ios/AppIcon.appiconset/*.png      $XCASSETS/AppIcon.appiconset/
          cp assets/ios/AppIcon.appiconset/Contents.json $XCASSETS/AppIcon.appiconset/

          # Splash screen
          mkdir -p $XCASSETS/Splash.imageset
          cp assets/ios/SplashScreen/Default@2x~universal~anyany.png $XCASSETS/Splash.imageset/splash.png
          cat > $XCASSETS/Splash.imageset/Contents.json << 'JSON'
          {
            "images": [
              { "idiom": "universal", "scale": "1x" },
              { "idiom": "universal", "scale": "2x", "filename": "splash.png" },
              { "idiom": "universal", "scale": "3x" }
            ],
            "info": { "author": "xcode", "version": 1 }
          }
          JSON

          echo "✅ iOS icons & splash applied"

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      - name: Build iOS (unsigned)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -archivePath ios/App/build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Package IPA
        run: |
          APP=$(find ios/App/build/App.xcarchive -name "*.app" | head -1)
          mkdir -p /tmp/Payload
          cp -r "$APP" /tmp/Payload/
          cd /tmp && zip -r POS-HC.ipa Payload/
          mkdir -p $GITHUB_WORKSPACE/ios/App/build/ipa
          cp /tmp/POS-HC.ipa $GITHUB_WORKSPACE/ios/App/build/ipa/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: POS-HC-iOS-IPA
          path: ios/App/build/ipa/POS-HC.ipa
          retention-days: 30
